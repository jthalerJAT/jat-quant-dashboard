<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JAT Quant Signal System</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #262626;
      --text: #fafafa;
      --muted: #a3a3a3;
      --accent: #dc2626;
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.15);
      --red-dim: rgba(220, 38, 38, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.45;
      font-size: 15px;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1rem 2rem;
    }

    /* Header */
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 1rem 0 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      font-weight: 700;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }

    .brand span {
      color: var(--accent);
    }

    .header-meta {
      text-align: right;
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .header-meta .ts {
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .pulse {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.25rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    /* Alerts */
    .alert {
      padding: 0.85rem 1rem;
      border-radius: 4px;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
    }

    .alert-suspend {
      background: rgba(220, 38, 38, 0.2);
      border: 1px solid var(--accent);
      color: #fecaca;
    }

    .alert-circuit {
      background: rgba(234, 88, 12, 0.18);
      border: 1px solid #ea580c;
      color: #fed7aa;
    }

    .alert-load {
      background: rgba(127, 29, 29, 0.35);
      border: 1px solid #b91c1c;
      color: #fecaca;
    }

    /* Regime card */
    .regime-card {
      background: var(--surface);
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
      margin: 1.25rem 0 1.5rem;
      border: 2px solid var(--regime-border, #404040);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
    }

    .regime-card.STRONG_BULL { --regime-border: #15803d; }
    .regime-card.WEAK_BULL { --regime-border: #a16207; }
    .regime-card.WEAK_BEAR { --regime-border: #c2410c; }
    .regime-card.STRONG_BEAR { --regime-border: #991b1b; }

    /* Risk regime card */
    .risk-regime-wrap {
      margin-bottom: 1.75rem;
    }

    .risk-regime-wrap h2 {
      margin-bottom: 0.65rem;
    }

    .risk-regime-card {
      background: var(--surface);
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
      border: 2px solid var(--risk-border, #404040);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
    }

    .risk-regime-card.STRONG_RISK_ON {
      --risk-border: #16a34a;
      background: rgba(22, 163, 74, 0.22);
    }

    .risk-regime-card.MILD_RISK_ON {
      --risk-border: #15803d;
      background: var(--surface);
    }

    .risk-regime-card.NEUTRAL {
      --risk-border: #52525b;
      background: var(--surface);
    }

    .risk-regime-card.MILD_RISK_OFF {
      --risk-border: #ea580c;
      background: var(--surface);
    }

    .risk-regime-card.STRONG_RISK_OFF {
      --risk-border: #dc2626;
      background: rgba(185, 28, 28, 0.22);
    }

    .risk-regime-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .risk-class-label {
      font-size: clamp(1.25rem, 3.5vw, 1.75rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .risk-score-big {
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      margin-bottom: 1.25rem;
      color: var(--text);
    }

    .risk-grid {
      display: grid;
      gap: 0.35rem;
    }

    .risk-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 0.75rem;
      align-items: center;
      padding: 0.5rem 0.65rem;
      border-radius: 4px;
      font-size: 0.8125rem;
    }

    .risk-row.pos {
      background: rgba(20, 83, 45, 0.45);
      border: 1px solid rgba(34, 197, 94, 0.35);
    }

    .risk-row.neg {
      background: rgba(69, 10, 10, 0.5);
      border: 1px solid rgba(248, 113, 113, 0.25);
    }

    .risk-row.zero {
      background: rgba(63, 63, 70, 0.6);
      border: 1px solid var(--border);
    }

    .risk-row .nm {
      color: var(--text);
      font-weight: 500;
    }

    .risk-row .sc {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      min-width: 2.5rem;
      text-align: right;
    }

    .risk-row .lb {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      min-width: 5.5rem;
      text-align: right;
    }

    .regime-label {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
      font-variant-numeric: tabular-nums;
    }

    .regime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.75rem 1.25rem;
      font-size: 0.875rem;
    }

    .regime-grid dt {
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .regime-grid dd {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* Section */
    section {
      margin-bottom: 1.75rem;
    }

    h2 {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 0.65rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border);
    }

    .empty-msg {
      background: var(--surface);
      border: 1px dashed var(--border);
      color: var(--muted);
      padding: 1.25rem;
      text-align: center;
      border-radius: 4px;
      font-size: 0.9rem;
    }

    /* Tables */
    .table-scroll {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }

    th {
      text-align: left;
      padding: 0.65rem 0.75rem;
      background: #0d0d0d;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.65rem;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr.row-long td:first-child {
      box-shadow: inset 3px 0 0 var(--green);
    }

    tr.row-short td:first-child {
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .action-long { color: #86efac; font-weight: 600; }
    .action-short { color: #fca5a5; font-weight: 600; }

    /* Two columns */
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 900px) {
      .split {
        grid-template-columns: 1fr;
      }
    }

    .subcard h3 {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .bar-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-width: 80px;
    }

    .bar-track {
      flex: 1;
      height: 6px;
      background: #1f1f1f;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), #f87171);
      max-width: 100%;
    }

    .bar-fill.long {
      background: linear-gradient(90deg, #166534, var(--green));
    }

    .bar-val {
      font-size: 0.7rem;
      color: var(--muted);
      width: 2.5rem;
      text-align: right;
    }

    /* Footer */
    footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
    }

    footer strong {
      color: var(--text);
      font-weight: 600;
    }

    footer .sep {
      opacity: 0.35;
      padding: 0 0.5rem;
    }

    /* Terminal pct colors */
    .terminal-pct-pos { color: #4ade80; font-weight: 600; }
    .terminal-pct-neg { color: #f87171; font-weight: 600; }
    .terminal-pct-neu { color: var(--muted); font-weight: 500; }

    .opp-stack,
    .momo-stack {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .opp-card,
    .momo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.85rem 1rem;
      font-size: 0.8125rem;
      line-height: 1.55;
      font-variant-numeric: tabular-nums;
    }

    .opp-card.opp-long {
      border-left: 3px solid var(--green);
      box-shadow: inset 0 0 0 1px rgba(34, 197, 94, 0.08);
    }

    .opp-card.opp-short {
      border-left: 3px solid var(--accent);
      box-shadow: inset 0 0 0 1px rgba(220, 38, 38, 0.08);
    }

    .opp-head-row,
    .momo-head-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem 0.65rem;
      font-weight: 700;
      font-size: 0.875rem;
      letter-spacing: 0.03em;
      margin-bottom: 0.6rem;
      color: var(--text);
    }

    .opp-sep,
    .momo-sep {
      color: #3f3f46;
      font-weight: 400;
      user-select: none;
    }

    .opp-block-title,
    .momo-block-title {
      color: #a3a3a3;
      font-size: 0.72rem;
      font-weight: 600;
      margin-top: 0.55rem;
      margin-bottom: 0.2rem;
      letter-spacing: 0.04em;
    }

    .opp-block-body,
    .momo-block-body {
      padding-left: 0.85rem;
      margin-bottom: 0.15rem;
      line-height: 1.7;
      font-size: 0.8125rem;
    }

    .opp-block-body .lbl,
    .momo-block-body .lbl {
      color: var(--muted);
      font-weight: 500;
      margin-right: 0.2rem;
    }

    .opp-label-line,
    .momo-label-line {
      margin-top: 0.55rem;
      padding-top: 0.45rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: #d4d4d8;
    }

    .opp-label-line .lbl,
    .momo-label-line .lbl {
      color: var(--muted);
      font-weight: 600;
      margin-right: 0.35rem;
    }

    .range-inline {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      vertical-align: middle;
    }

    .range-inline .bar-track {
      width: 72px;
      height: 5px;
      background: #1a1a1a;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .range-bar-fill {
      display: block;
      height: 100%;
      border-radius: 2px;
      max-width: 100%;
      box-sizing: border-box;
      background: linear-gradient(90deg, #f87171 0%, #fbbf24 45%, #4ade80 100%);
    }

    .residual-note {
      font-size: 0.7rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 0.35rem;
    }

    .momentum-factors {
      margin-bottom: 1rem;
    }

    .momentum-factors .factor-line {
      font-size: 0.9rem;
      padding: 0.65rem 0.85rem;
      margin-bottom: 0.5rem;
      background: #0d0d0d;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
    }

    .momentum-factors .factor-sub {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.35rem;
      line-height: 1.4;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">JAT <span>QUANT</span> SIGNAL SYSTEM</div>
      <div class="header-meta">
        <div>Run time (ET): <span class="ts" id="hdr-ts">—</span></div>
        <div class="pulse"><span class="pulse-dot"></span> <span id="refresh-note">Loading…</span></div>
      </div>
    </header>

    <div id="load-error" class="alert alert-load" style="display: none;"></div>
    <div id="alerts"></div>

    <section class="regime-card" id="regime-card">
      <div class="regime-label" id="regime-title">—</div>
      <dl class="regime-grid" id="regime-stats"></dl>
    </section>

    <section class="risk-regime-wrap" id="risk-regime-section">
      <div class="risk-regime-title">Risk regime</div>
      <div class="risk-regime-card" id="risk-regime-card">
        <div class="risk-class-label" id="risk-class-label">—</div>
        <div class="risk-score-big" id="risk-score-display">—</div>
        <div class="risk-grid" id="risk-grid"></div>
      </div>
    </section>

    <section id="momentum-section">
      <h2>Momentum context</h2>
      <div id="momentum-factors-wrap" class="momentum-factors"></div>
      <div class="split">
        <div class="subcard">
          <h3>Top momentum</h3>
          <div id="top-momentum-wrap" class="momo-stack"></div>
        </div>
        <div class="subcard">
          <h3>Bottom momentum</h3>
          <div id="bottom-momentum-wrap" class="momo-stack"></div>
        </div>
      </div>
    </section>

    <section>
      <h2>Confirmed signals</h2>
      <div id="confirmed-wrap"></div>
    </section>

    <section class="split">
      <div class="subcard">
        <h3>Top opportunities — Oversold (watch longs)</h3>
        <div id="oversold-wrap" class="opp-stack"></div>
      </div>
      <div class="subcard">
        <h3>Top opportunities — Overbought (watch shorts)</h3>
        <div id="overbought-wrap" class="opp-stack"></div>
      </div>
    </section>

    <footer id="footer"></footer>
  </div>

  <script>
    var SIGNALS_URL = "./data/signals_latest.json";
    var REFRESH_MS = 5 * 60 * 1000;

    var RISK_COMPONENT_ROWS = [
      ["qqq_trend", "QQQ Trend (50-day MA)"],
      ["vix_level", "VIX Level"],
      ["vix_term_structure", "VIX Term Structure"],
      ["credit_spreads", "Credit Spreads (HYG/LQD)"],
      ["momentum_factor", "Momentum Factor"],
      ["small_cap_ratio", "Small Cap Ratio"],
      ["qqq_short_momentum", "QQQ Short-term Momentum"],
      ["vix_direction", "VIX Direction"]
    ];

    var lastSuccessfulJsonTimestamp = null;
    var lastSuccessfulWallMs = null;

    function escapeHtml(s) {
      if (s == null) return "N/A";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function isMissing(v) {
      return v == null || v === "";
    }

    function formatPctOrNA(v) {
      if (isMissing(v)) return "N/A";
      var n = Number(v);
      if (Number.isNaN(n)) return "N/A";
      return n.toFixed(2) + "%";
    }

    /** Percent already in % points in JSON; always ±0.00% */
    function fmtPctSigned2(v) {
      if (isMissing(v) || Number.isNaN(Number(v))) return "N/A";
      var n = Number(v);
      return (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
    }

    function fmtZSigned2(v) {
      if (isMissing(v) || Number.isNaN(Number(v))) return "N/A";
      var n = Number(v);
      return (n >= 0 ? "+" : "") + n.toFixed(2);
    }

    function clsActualReturn(n) {
      if (isMissing(n) || Number.isNaN(Number(n))) return "terminal-pct-neu";
      n = Number(n);
      if (n > 0) return "terminal-pct-pos";
      if (n < 0) return "terminal-pct-neg";
      return "terminal-pct-neu";
    }

    function clsResidualLong(n) {
      if (isMissing(n) || Number.isNaN(Number(n))) return "terminal-pct-neu";
      n = Number(n);
      if (n < 0) return "terminal-pct-pos";
      if (n > 0) return "terminal-pct-neg";
      return "terminal-pct-neu";
    }

    function clsResidualShort(n) {
      if (isMissing(n) || Number.isNaN(Number(n))) return "terminal-pct-neu";
      n = Number(n);
      if (n > 0) return "terminal-pct-neg";
      if (n < 0) return "terminal-pct-pos";
      return "terminal-pct-neu";
    }

    function clsFactor(n) {
      return clsActualReturn(n);
    }

    function spanCls(text, cls) {
      return '<span class="' + cls + '">' + escapeHtml(text) + "</span>";
    }

    function spanPctSigned(v, colorFn) {
      if (isMissing(v) || Number.isNaN(Number(v))) return spanCls("N/A", "terminal-pct-neu");
      return spanCls(fmtPctSigned2(v), colorFn(Number(v)));
    }

    function spanPctExpected(v) {
      if (isMissing(v) || Number.isNaN(Number(v))) return spanCls("N/A", "terminal-pct-neu");
      return spanCls(fmtPctSigned2(v), "terminal-pct-neu");
    }

    /** Horizontal bar: red at 0%, green at 100% (gradient along fill). */
    function rangeInlineBar(pct) {
      if (isMissing(pct) || Number.isNaN(Number(pct))) {
        return '<span class="range-inline"><span class="terminal-pct-neu">N/A</span></span>';
      }
      var w = Math.min(100, Math.max(0, Number(pct)));
      return (
        '<span class="range-inline">' +
        '<span class="bar-track"><span class="bar-fill range-bar-fill" style="width:' +
        w +
        '%"></span></span>' +
        '<span class="terminal-pct-neu">' +
        fmtPctSigned2(pct) +
        "</span></span>"
      );
    }

    function formatFloatOrNA(v, digits) {
      if (isMissing(v)) return "N/A";
      var n = Number(v);
      if (Number.isNaN(n)) return "N/A";
      return n.toFixed(digits != null ? digits : 2);
    }

    function formatScalarOrNA(v) {
      if (isMissing(v)) return "N/A";
      var n = Number(v);
      if (Number.isNaN(n)) return "N/A";
      return String(v);
    }

    function formatYesNoNA(v) {
      if (v === true) return "Yes";
      if (v === false) return "No";
      return "N/A";
    }

    function formatTimestampEt(raw) {
      if (isMissing(raw)) return "N/A";
      var s = String(raw);
      var cut = s.indexOf(" ET (");
      if (cut !== -1) return s.slice(0, cut + 3);
      var d = new Date(s.replace(" UTC", "Z"));
      if (!Number.isNaN(d.getTime())) {
        try {
          return (
            d.toLocaleString("en-US", {
              timeZone: "America/New_York",
              year: "numeric",
              month: "2-digit",
              day: "2-digit",
              hour: "2-digit",
              minute: "2-digit",
              second: "2-digit",
              hour12: false
            }) + " ET"
          );
        } catch (e) {
          return s;
        }
      }
      return s;
    }

    function conviction(strength) {
      const s = Number(strength);
      if (s >= 2.0) return "High";
      if (s >= 1.0) return "Medium";
      if (s >= 0.5) return "Medium";
      return "Low";
    }

    function parseTs(s) {
      if (isMissing(s)) return null;
      var s2 = String(s);
      var utcInParens = s2.match(/\((\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) UTC\)/);
      if (utcInParens) {
        var d = new Date(utcInParens[1].replace(" ", "T") + "Z");
        if (!Number.isNaN(d.getTime())) return d;
      }
      var d2 = new Date(s2.replace(" UTC", "Z"));
      return Number.isNaN(d2.getTime()) ? null : d2;
    }

    function nextRunStr(ts) {
      var d = parseTs(ts);
      if (!d) return "N/A";
      d.setHours(d.getHours() + 1);
      return d.toISOString().replace("T", " ").replace(/\.\d{3}Z/, " UTC");
    }

    function renderAlerts(data) {
      var el = document.getElementById("alerts");
      el.innerHTML = "";
      if (data.suspended === true) {
        el.innerHTML += '<div class="alert alert-suspend">SYSTEM SUSPENDED</div>';
      }
      if (data.circuit_breaker === true) {
        el.innerHTML += '<div class="alert alert-circuit">CIRCUIT BREAKER ACTIVE</div>';
      }
    }

    function riskRowLabel(score) {
      if (score == null || score === "" || Number.isNaN(Number(score))) return "N/A";
      var s = Number(score);
      if (s > 0) return "RISK ON";
      if (s < 0) return "RISK OFF";
      return "NEUTRAL";
    }

    function renderRiskRegime(data) {
      var cls = data.risk_classification;
      if (isMissing(cls)) cls = "NEUTRAL";
      var card = document.getElementById("risk-regime-card");
      card.className = "risk-regime-card " + cls;
      document.getElementById("risk-class-label").textContent = cls;
      var rs = data.risk_score;
      var scoreEl = document.getElementById("risk-score-display");
      if (isMissing(rs) || Number.isNaN(Number(rs))) {
        scoreEl.textContent = "N/A";
      } else {
        var n = Number(rs);
        scoreEl.textContent = (n >= 0 ? "+" : "") + n + " / 8";
      }
      var rc = data.risk_components || {};
      var grid = document.getElementById("risk-grid");
      grid.innerHTML = RISK_COMPONENT_ROWS.map(function (row) {
        var key = row[0];
        var name = row[1];
        var raw = rc[key];
        if (isMissing(raw) || Number.isNaN(Number(raw))) {
          return (
            '<div class="risk-row zero">' +
            '<span class="nm">' + escapeHtml(name) + "</span>" +
            '<span class="sc">N/A</span>' +
            '<span class="lb">N/A</span>' +
            "</div>"
          );
        }
        var sc = Number(raw);
        var rowCls = sc > 0 ? "pos" : (sc < 0 ? "neg" : "zero");
        var scTxt = sc > 0 ? "+" + sc : String(sc);
        return (
          '<div class="risk-row ' + rowCls + '">' +
          '<span class="nm">' + escapeHtml(name) + "</span>" +
          '<span class="sc">' + scTxt + "</span>" +
          '<span class="lb">' + riskRowLabel(sc) + "</span>" +
          "</div>"
        );
      }).join("");
    }

    function renderRegime(data) {
      document.getElementById("hdr-ts").textContent = formatTimestampEt(data.timestamp);
      var card = document.getElementById("regime-card");
      card.className = "regime-card " + (data.regime || "");

      document.getElementById("regime-title").textContent = isMissing(data.regime) ? "N/A" : data.regime;

      var stats = document.getElementById("regime-stats");
      var rows = [
        ["QQQ momentum", formatPctOrNA(data.qqq_momentum)],
        ["MSQQUMOL momentum", formatPctOrNA(data.msqqumol_momentum)],
        ["MSQQUMOL z-score", formatFloatOrNA(data.msqqumol_zscore, 2)],
        ["Trading mode", isMissing(data.trading_mode) ? "N/A" : String(data.trading_mode)],
        ["Threshold", formatScalarOrNA(data.threshold)],
        ["Suspended", formatYesNoNA(data.suspended)],
        ["Circuit breaker", data.circuit_breaker === true ? "Active" : data.circuit_breaker === false ? "Inactive" : "N/A"]
      ];
      stats.innerHTML = rows
        .map(function (kv) {
          return "<dt>" + escapeHtml(kv[0]) + "</dt><dd>" + escapeHtml(kv[1]) + "</dd>";
        })
        .join("");
    }

    function renderMomentumFactors(data, mc) {
      var wrap = document.getElementById("momentum-factors-wrap");
      if (!wrap) return;
      var hourF = mc.hour_factor_return;
      if (isMissing(hourF)) hourF = data.momentum_factor_return_this_hour_pct;
      var dayF = mc.intraday_factor_return;
      var hourTxt = isMissing(hourF) || Number.isNaN(Number(hourF)) ? "N/A" : fmtPctSigned2(hourF);
      var dayTxt = isMissing(dayF) || Number.isNaN(Number(dayF)) ? "N/A" : fmtPctSigned2(dayF);
      var hourSpan =
        hourTxt === "N/A"
          ? spanCls(hourTxt, "terminal-pct-neu")
          : spanCls(hourTxt, clsFactor(Number(hourF)));
      var daySpan =
        dayTxt === "N/A"
          ? spanCls(dayTxt, "terminal-pct-neu")
          : spanCls(dayTxt, clsFactor(Number(dayF)));
      var hb = hourTxt === "N/A" ? "N/A" : hourTxt;
      var db = dayTxt === "N/A" ? "N/A" : dayTxt;
      wrap.innerHTML =
        '<div class="factor-line">Hour Factor Return: ' +
        hourSpan +
        '<div class="factor-sub">[top momentum outperforming bottom by ' +
        escapeHtml(hb) +
        " last hour]</div></div>" +
        '<div class="factor-line">Day Factor Return:  ' +
        daySpan +
        '<div class="factor-sub">[top momentum outperforming bottom by ' +
        escapeHtml(db) +
        " today]</div></div>";
    }

    function renderMomentumRowCard(r, isTopMomentum) {
      var clsR = isTopMomentum ? clsResidualLong : clsResidualShort;
      var rr = r.raw_return;
      var twelve =
        rr != null && !Number.isNaN(Number(rr))
          ? fmtPctSigned2(Number(rr) * 100)
          : "N/A";
      var mz = fmtZSigned2(r.momentum_zscore);
      var wl = r.weight_label != null ? String(r.weight_label) : "";
      var rl = r.residual_label != null ? String(r.residual_label) : "";
      var head =
        '<div class="momo-head-row">' +
        escapeHtml(r.ticker || "N/A") +
        ' <span class="momo-sep">|</span> mom_z: ' +
        spanCls(mz, "terminal-pct-neu") +
        ' <span class="momo-sep">|</span> 12-1m: ' +
        spanCls(twelve, "terminal-pct-neu") +
        "</div>";
      var dayBlock =
        '<div class="momo-block-title">Day (vs yday close):</div>' +
        '<div class="momo-block-body">' +
        '<span class="lbl">Actual:</span> ' +
        spanPctSigned(r.intraday_return, clsActualReturn) +
        '   <span class="lbl">Expected:</span> ' +
        spanPctExpected(r.intraday_expected) +
        '   <span class="lbl">Residual:</span> ' +
        spanPctSigned(r.intraday_residual, clsR) +
        "</div>";
      var hourBlock =
        '<div class="momo-block-title">Hour (last bar):</div>' +
        '<div class="momo-block-body">' +
        '<span class="lbl">Actual:</span> ' +
        spanPctSigned(r.hour_return, clsActualReturn) +
        '   <span class="lbl">Expected:</span> ' +
        spanPctExpected(r.hour_expected) +
        '   <span class="lbl">Residual:</span> ' +
        spanPctSigned(r.hour_residual, clsR) +
        "</div>";
      var blendLine =
        '<div class="momo-block-title" style="margin-top:0.45rem;">Blended:</div>' +
        '<div class="momo-block-body">' +
        spanPctSigned(r.blended_residual, clsR) +
        (wl ? "  [" + escapeHtml(wl) + "]" : "") +
        "</div>";
      var labelLine =
        rl && rl !== "N/A"
          ? '<div class="momo-label-line"><span class="lbl">Label:</span> ' +
            escapeHtml(rl) +
            "</div>"
          : "";
      return (
        '<div class="momo-card">' +
        head +
        dayBlock +
        hourBlock +
        blendLine +
        labelLine +
        "</div>"
      );
    }

    function renderMomentumContext(data) {
      var mc = data.momentum_context || {};
      renderMomentumFactors(data, mc);
      function stack(rows, isTop) {
        if (!rows || !rows.length) {
          return '<div class="empty-msg">No data</div>';
        }
        return rows
          .map(function (row) {
            return renderMomentumRowCard(row, isTop);
          })
          .join("");
      }
      var tm = document.getElementById("top-momentum-wrap");
      var bm = document.getElementById("bottom-momentum-wrap");
      if (tm) tm.innerHTML = stack(mc.top_momentum, true);
      if (bm) bm.innerHTML = stack(mc.bottom_momentum, false);
    }

    function renderConfirmed(data) {
      var wrap = document.getElementById("confirmed-wrap");
      var sigs = data.confirmed_signals;
      if (!sigs || !sigs.length) {
        wrap.innerHTML = '<div class="empty-msg">NO CONFIRMED SIGNALS THIS HOUR</div>';
        return;
      }
      var rows = sigs
        .map(function (r) {
          var isLong = (r.action || "").toUpperCase() === "LONG";
          var cls = isLong ? "row-long" : "row-short";
          var actCls = isLong ? "action-long" : "action-short";
          var z = r.zscore != null ? r.zscore : r.z;
          var rp = r.range_pct != null ? r.range_pct : r.range_percentile;
          var st = r.strength != null ? r.strength : r.signal_strength;
          return (
            "<tr class=\"" + cls + "\">" +
            "<td>" + escapeHtml(r.ticker) + "</td>" +
            "<td class=\"" + actCls + "\">" + escapeHtml(r.action) + "</td>" +
            "<td>" + (z != null && !Number.isNaN(Number(z)) ? Number(z).toFixed(2) : "N/A") + "</td>" +
            "<td>" + (rp != null && !Number.isNaN(Number(rp)) ? Number(rp).toFixed(1) : "N/A") + "</td>" +
            "<td>" + (st != null && !Number.isNaN(Number(st)) ? Number(st).toFixed(2) : "N/A") + "</td>" +
            "<td>" + conviction(st != null ? st : 0) + "</td>" +
            "</tr>"
          );
        })
        .join("");
      wrap.innerHTML =
        '<div class="table-scroll"><table><thead><tr>' +
        "<th>Ticker</th><th>Action</th><th>Z-Score</th><th>Range%</th><th>Strength</th><th>Conviction</th>" +
        "</tr></thead><tbody>" + rows + "</tbody></table></div>";
    }

    function renderOpportunityCard(r, isLong) {
      var clsR = isLong ? clsResidualLong : clsResidualShort;
      var z = !isMissing(r.zscore) && !Number.isNaN(Number(r.zscore)) ? r.zscore : r.residual_zscore;
      var rp =
        r.range_percentile != null && r.range_percentile !== ""
          ? r.range_percentile
          : r.range_pct;
      var momz = r.momentum_zscore;
      var wl = r.weight_label != null ? String(r.weight_label) : "";
      var rl = r.residual_label != null ? String(r.residual_label) : "";
      var cardCls = isLong ? "opp-card opp-long" : "opp-card opp-short";
      var head =
        '<div class="opp-head-row">' +
        escapeHtml(r.ticker || "N/A") +
        ' <span class="opp-sep">|</span> Residual Z: ' +
        spanCls(fmtZSigned2(z), "terminal-pct-neu") +
        ' <span class="opp-sep">|</span> Range: ' +
        rangeInlineBar(rp) +
        ' <span class="opp-sep">|</span> Mom Z: ' +
        spanCls(fmtZSigned2(momz), "terminal-pct-neu") +
        "</div>";
      var dayBlock =
        '<div class="opp-block-title">Day (vs yday close):</div>' +
        '<div class="opp-block-body">' +
        '<span class="lbl">Actual:</span> ' +
        spanPctSigned(r.intraday_return, clsActualReturn) +
        '   <span class="lbl">Expected:</span> ' +
        spanPctExpected(r.intraday_expected) +
        '   <span class="lbl">Residual:</span> ' +
        spanPctSigned(r.intraday_residual, clsR) +
        "</div>";
      var hourBlock =
        '<div class="opp-block-title">Hour (last bar):</div>' +
        '<div class="opp-block-body">' +
        '<span class="lbl">Actual:</span> ' +
        spanPctSigned(r.hour_return, clsActualReturn) +
        '   <span class="lbl">Expected:</span> ' +
        spanPctExpected(r.hour_expected) +
        '   <span class="lbl">Residual:</span> ' +
        spanPctSigned(r.hour_residual, clsR) +
        "</div>";
      var blendLine =
        '<div class="opp-block-title" style="margin-top:0.45rem;">Blended:</div>' +
        '<div class="opp-block-body">' +
        spanPctSigned(r.blended_residual, clsR) +
        (wl ? "  [" + escapeHtml(wl) + "]" : "") +
        "</div>";
      var note =
        rl && rl !== "N/A"
          ? '<div class="opp-label-line"><span class="lbl">Label:</span> ' +
            escapeHtml(rl) +
            "</div>"
          : "";
      return (
        '<div class="' +
        cardCls +
        '">' +
        head +
        dayBlock +
        hourBlock +
        blendLine +
        note +
        "</div>"
      );
    }

    function renderOpportunityStack(rows, isLong) {
      if (!rows || !rows.length) {
        return '<div class="empty-msg">No data</div>';
      }
      return rows
        .map(function (row) {
          return renderOpportunityCard(row, isLong);
        })
        .join("");
    }

    function renderFooter(data) {
      var sigs = data.confirmed_signals || [];
      var n = sigs.length;
      var next = nextRunStr(data.timestamp);
      document.getElementById("footer").innerHTML =
        "<strong>Next run:</strong> " + next +
        ' <span class="sep">|</span> <strong>Regime:</strong> ' + escapeHtml(isMissing(data.regime) ? "N/A" : data.regime) +
        ' <span class="sep">|</span> <strong>Signals:</strong> ' + n +
        '<br><span style="color: var(--muted); font-size: 0.7rem;">Last successful data timestamp: ' +
        escapeHtml(lastSuccessfulJsonTimestamp || "N/A") +
        "</span>";
    }

    function render(data) {
      renderAlerts(data);
      renderRegime(data);
      renderRiskRegime(data);
      renderMomentumContext(data);
      renderConfirmed(data);
      var overS = Array.isArray(data.top_opportunities_oversold)
        ? data.top_opportunities_oversold
        : data.top_oversold || [];
      var overB = Array.isArray(data.top_opportunities_overbought)
        ? data.top_opportunities_overbought
        : data.top_overbought || [];
      document.getElementById("oversold-wrap").innerHTML = renderOpportunityStack(overS, true);
      document.getElementById("overbought-wrap").innerHTML = renderOpportunityStack(overB, false);
      renderFooter(data);
    }

    function showLoadError(message) {
      var el = document.getElementById("load-error");
      var lastTs = lastSuccessfulJsonTimestamp || "never";
      el.style.display = "block";
      el.textContent =
        message +
        " Last successful update: " +
        lastTs +
        (lastSuccessfulWallMs
          ? " (loaded " + new Date(lastSuccessfulWallMs).toLocaleString() + ")"
          : "");
    }

    function hideLoadError() {
      document.getElementById("load-error").style.display = "none";
    }

    async function loadSignals() {
      var note = document.getElementById("refresh-note");
      try {
        var r = await fetch(SIGNALS_URL, { cache: "no-store" });
        if (!r.ok) throw new Error("HTTP " + r.status);
        var text = await r.text();
        var data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          throw new Error("Invalid JSON: " + (e && e.message ? e.message : "parse error"));
        }
        lastSuccessfulJsonTimestamp = formatTimestampEt(data.timestamp);
        lastSuccessfulWallMs = Date.now();
        hideLoadError();
        render(data);
        if (note) {
          note.textContent =
            "Auto-refresh every 5 min · last fetch " + new Date().toLocaleString();
        }
      } catch (e) {
        var msg = e && e.message ? e.message : String(e);
        showLoadError("Could not load " + SIGNALS_URL + ": " + msg + ".");
        if (note) {
          note.textContent =
            "Auto-refresh every 5 min · fetch failed (showing last good data if any)";
        }
      }
    }

    loadSignals();
    setInterval(loadSignals, REFRESH_MS);
  </script>
</body>
</html>
